theme: PaperMod

enableInlineShortcodes: true
enableRobotsTXT: true
pagination:
  pagerSize: 20

taxonomies:
    tag: tags

menu:
    main:
        - name: Papers
          url: papers/
          weight: 1
        - name: News
          url: news/
          weight: 2
        - name: Talks
          url: talks/
          weight: 3
        - name: Fun
