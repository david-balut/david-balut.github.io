{{- define "main" }}
<div class="post-single">
    <header class="post-header">
        <h1 class="post-title">{{ .Title }}</h1>
    </header>
    <div class="fun-gallery">
        {{- $images := .Resources.ByType "image" }}
        {{- range $images }}
        <div class="fun-photo">
            <img src="{{ .RelPermalink }}" alt="" loading="lazy" />
        </div>
        {{- end }}
    </div>
</div>
{{- end }}
